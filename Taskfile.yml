version: "3"

vars:
  LINTER_VER: "v2.12.2"
  GOMODCACHE:
    sh: go env GOMODCACHE
  GOCACHE:
    sh: go env GOCACHE
  PWD_DIR:
    sh: pwd

env:
  GOWORK: "off"

tasks:
  run:
    desc: "Full cycle"
    cmds:
      - task: vendor-root
      - task: lint-root
      - task: test-root

  before-commit:
    desc: "Run example checks and full cycle"
    cmds:
      - task: check-examples
      - task: run

  lint:
    desc: "Lint root module"
    cmds:
      - task: vendor-root
      - task: lint-root

  test:
    desc: "Test root module"
    cmds:
      - task: vendor-root
      - task: test-root

  check-examples:
    desc: "Check example modules"
    cmds:
      - |
        set -e

        find ./examples -name go.mod -print | sort | while IFS= read -r mod; do
          dir="$(dirname "$mod")"
          echo "==> $dir"

          (
            cd "$dir"
            rm -rf vendor
            go get ./...
            go mod tidy -v
            go mod vendor
            go test ./...
          )
        done

  vendor-root:
    desc: "Vendor root module"
    cmds:
      - rm -rf vendor
      - go mod tidy -v
      - go mod vendor

  lint-root:
    desc: "Lint root module"
    cmds:
      - task: _run-linter
        vars:
          WORK_DIR: /app

  test-root:
    desc: "Test root module"
    cmds:
      - go test -mod=vendor -race -v -count=1 ./...

  _run-linter:
    desc: "Run golangci-lint in Docker"
    cmds:
      - >
        docker run --rm
        -u $(id -u):$(id -g)
        -v {{.PWD_DIR}}:/app
        -v {{.GOMODCACHE}}:/go/pkg/mod
        -v {{.GOCACHE}}:/go/build-cache
        -e GOMODCACHE=/go/pkg/mod
        -e GOCACHE=/go/build-cache
        -e GOLANGCI_LINT_CACHE=/go/build-cache/golangci-lint
        -e GOWORK=off
        -w {{.WORK_DIR}}
        golangci/golangci-lint:{{.LINTER_VER}}
        golangci-lint run --timeout 5m --fix --modules-download-mode vendor