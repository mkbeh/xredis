name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-input: ""
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: go.sum
          go-package: ./...
